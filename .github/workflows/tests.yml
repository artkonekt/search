name: run-tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ '8.2', '8.3', '8.4', '8.5' ]
        laravel: [ '11.46', '11.50', '12.50', '12.56', '13.0', '13.5' ]
        carbon: ['2.x', '3.x']
        exclude:
          - php: '8.2'
            laravel: '13.0'
          - php: '8.2'
            laravel: '13.5'
          - laravel: '12.50'
            carbon: '2.x'
          - laravel: '12.56'
            carbon: '2.x'
          - laravel: '13.0'
            carbon: '2.x'
          - laravel: '13.5'
            carbon: '2.x'
    name: PHP ${{ matrix.php }} Laravel ${{ matrix.laravel }} Carbon ${{ matrix.carbon }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: no
          MYSQL_USER: search_test
          MYSQL_DATABASE: search_test
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: search_test
        ports:
          - 5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@master
      - name: Installing PHP
        uses: shivammathur/setup-php@master
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, mysql, mysqli, pdo_mysql, pdo_pgsql
          tools: composer:v2
      - name: Lock Package Versions
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}.*" --no-update -v
          composer require "nesbot/carbon:${{ matrix.carbon }}.*" --no-update -v
      - name: Composer Install
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Enable Postgres Trigram Extension
        run: |
          PGPASSWORD=secret psql -U postgres -h 127.0.0.1 -p ${{ job.services.postgres.ports[5432] }} -d search_test -tc "CREATE EXTENSION pg_trgm;"
      - name: Tests - MySQL
        run: vendor/bin/phpunit --testdox
        env:
          DB_DATABASE: search_test
          DB_USERNAME: search_test
          DB_PASSWORD: secret
          DB_PORT: ${{ job.services.mysql.ports[3306] }}
      - name: Tests - Postgres
        run: vendor/bin/phpunit --testdox
        env:
          DB_CONNECTION: pgsql
          DB_DATABASE: search_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret
          DB_PORT: ${{ job.services.postgres.ports[5432] }}
      - name: Tests - SQLite
        run: vendor/bin/phpunit --testdox
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
